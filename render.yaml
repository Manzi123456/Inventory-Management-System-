services:
  - type: web
    name: airtel-inventory
    env: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/inventory-0.0.1-SNAPSHOT.jar
    healthCheckPath: /login
    autoDeploy: true
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: JPA_DDL_AUTO
        value: update
      - key: JPA_SHOW_SQL
        value: false
      - key: JPA_DEFER_INIT
        value: false
      - key: SQL_INIT_MODE
        value: never
