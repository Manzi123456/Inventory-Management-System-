spring.application.name=inventory

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/airtel_inventory}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.defer-datasource-initialization=${JPA_DEFER_INIT:false}

# Remove the dialect line completely ? let Spring detect it automatically
# This fixes the HHH000511 warning you saw in the console

spring.jpa.open-in-view=false
server.port=${PORT:8080}

# SQL initialization
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.sql.init.data-locations=classpath:data.sql