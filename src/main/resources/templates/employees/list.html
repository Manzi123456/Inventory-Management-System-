<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employees | Airtel Inventory</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container-fluid mt-4 px-4">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-people text-danger"></i> Employees</h2>
        <a th:href="@{/employees/new}" class="btn btn-danger">
            <i class="bi bi-person-plus"></i> Add Employee
        </a>
    </div>

    <!-- Search Bar -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <div class="row g-2">
                <div class="col-md-6">
                    <form th:action="@{/employees}" method="get">
                        <div class="input-group">
                            <input type="text" class="form-control"
                                   name="search" placeholder="Search by name..."
                                   th:value="${search}">
                            <button class="btn btn-danger" type="submit">
                                <i class="bi bi-search"></i>
                            </button>
                        </div>
                    </form>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/employees?active=true}" class="btn btn-outline-success w-100">
                        <i class="bi bi-person-check"></i> Active Only
                    </a>
                </div>
                <div class="col-md-3">
                    <a th:href="@{/employees}" class="btn btn-outline-secondary w-100">
                        <i class="bi bi-x-circle"></i> Clear Filter
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Employees Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-danger">
                    <tr>
                        <th>Employee ID</th>
                        <th>Full Name</th>
                        <th>Department</th>
                        <th>Job Title</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="emp : ${employees}">
                        <td class="fw-bold" th:text="${emp.employeeId}"></td>
                        <td th:text="${emp.firstName + ' ' + emp.lastName}"></td>
                        <td th:text="${emp.department != null ? emp.department.name : '-'}"></td>
                        <td th:text="${emp.jobTitle}"></td>
                        <td th:text="${emp.email}"></td>
                        <td th:text="${emp.phone}"></td>
                        <td>
                                <span th:class="${emp.active ? 'badge bg-success' : 'badge bg-secondary'}"
                                      th:text="${emp.active ? 'Active' : 'Inactive'}">
                                </span>
                        </td>
                        <td>
                            <a th:href="@{/employees/edit/{id}(id=${emp.id})}"
                               class="btn btn-sm btn-outline-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:if="${emp.active}"
                               th:href="@{/employees/deactivate/{id}(id=${emp.id})}"
                               class="btn btn-sm btn-outline-secondary"
                               onclick="return confirm('Deactivate this employee?')">
                                <i class="bi bi-person-x"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(employees)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            No employees found
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
