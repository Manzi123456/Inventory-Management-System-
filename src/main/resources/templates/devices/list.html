<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Devices | Airtel Inventory</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container-fluid mt-4 px-4">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Page Header -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-laptop text-danger"></i> Devices</h2>
        <a th:href="@{/devices/new}" class="btn btn-danger">
            <i class="bi bi-plus-circle"></i> Register Device
        </a>
    </div>

    <!-- Search and Filter Bar -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <div class="row g-2">

                <!-- Search box — submits to GET /devices?search=... -->
                <div class="col-md-5">
                    <form th:action="@{/devices}" method="get">
                        <div class="input-group">
                            <input type="text" class="form-control"
                                   name="search" placeholder="Search by tag, brand, model..."
                                   th:value="${search}">
                            <button class="btn btn-danger" type="submit">
                                <i class="bi bi-search"></i>
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Filter by Status -->
                <div class="col-md-3">
                    <form th:action="@{/devices}" method="get">
                        <div class="input-group">
                            <select class="form-select" name="status"
                                    onchange="this.form.submit()">
                                <option value="">All Statuses</option>
                                <!-- th:each loops over statuses enum values -->
                                <option th:each="s : ${statuses}"
                                        th:value="${s}"
                                        th:text="${s}"
                                        th:selected="${s.name() == selectedStatus}">
                                </option>
                            </select>
                        </div>
                    </form>
                </div>

                <!-- Filter by Type -->
                <div class="col-md-3">
                    <form th:action="@{/devices}" method="get">
                        <div class="input-group">
                            <select class="form-select" name="type"
                                    onchange="this.form.submit()">
                                <option value="">All Types</option>
                                <option th:each="t : ${deviceTypes}"
                                        th:value="${t}"
                                        th:text="${t}"
                                        th:selected="${t == selectedType}">
                                </option>
                            </select>
                        </div>
                    </form>
                </div>

                <!-- Clear filters button -->
                <div class="col-md-1">
                    <a th:href="@{/devices}" class="btn btn-outline-secondary w-100">
                        <i class="bi bi-x-circle"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Devices Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-danger">
                    <tr>
                        <th>Asset Tag</th>
                        <th>Type</th>
                        <th>Brand / Model</th>
                        <th>Serial No.</th>
                        <th>Status</th>
                        <th>Condition</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- th:each → loops through every device in the list -->
                    <tr th:each="device : ${devices}">
                        <td class="fw-bold"
                            th:text="${device.assetTag}"></td>
                        <td th:text="${device.deviceType}"></td>
                        <td th:text="${device.brand + ' ' + (device.model ?: '')}"></td>
                        <td th:text="${device.serialNumber}"></td>
                        <td>
                            <!-- Status badge color changes based on value -->
                            <span th:class="${'badge ' +
                                                                        (device.status != null && device.status.name() == 'AVAILABLE' ? 'bg-success' :
                                                                         device.status != null && device.status.name() == 'ASSIGNED' ? 'bg-warning text-dark' :
                                                                         device.status != null && device.status.name() == 'UNDER_REPAIR' ? 'bg-info' :
                                     'bg-secondary')}"
                                  th:text="${device.status}">
                                </span>
                        </td>
                        <td>
                                <span th:class="${'badge ' +
                                    (device.condition != null && device.condition.name() == 'NEW' ? 'bg-primary' :
                                     device.condition != null && device.condition.name() == 'GOOD' ? 'bg-success' :
                                     device.condition != null && device.condition.name() == 'FAIR' ? 'bg-warning text-dark' :
                                     'bg-danger')}"
                                      th:text="${device.condition}">
                                </span>
                        </td>
                        <td>
                            <!-- View button → goes to /devices/{id} -->
                            <a th:href="@{/devices/{id}(id=${device.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-eye"></i>
                            </a>
                            <!-- Edit button -->
                            <a th:href="@{/devices/edit/{id}(id=${device.id})}"
                               class="btn btn-sm btn-outline-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <!-- Retire button — only shown if not already retired -->
                                     <a th:if="${device.status == null || device.status.name() != 'RETIRED'}"
                               th:href="@{/devices/retire/{id}(id=${device.id})}"
                               class="btn btn-sm btn-outline-secondary"
                               onclick="return confirm('Retire this device?')">
                                <i class="bi bi-archive"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(devices)}">
                        <td colspan="7" class="text-center text-muted py-4">
                            No devices found
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
