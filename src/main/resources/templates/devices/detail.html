<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Device Detail | Airtel Inventory</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-4">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-laptop text-danger"></i>
            <span th:text="${device.assetTag}"></span>
        </h2>
        <div class="d-flex gap-2">
            <a th:href="@{/devices/edit/{id}(id=${device.id})}"
               class="btn btn-outline-warning">
                <i class="bi bi-pencil"></i> Edit
            </a>
            <a th:href="@{/devices}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Back
            </a>
        </div>
    </div>

    <div class="row g-3">
        <!-- Device Info Card -->
        <div class="col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-header bg-danger text-white">
                    <i class="bi bi-info-circle"></i> Device Information
                </div>
                <div class="card-body">
                    <table class="table table-borderless mb-0">
                        <tr>
                            <td class="fw-bold text-muted">Asset Tag</td>
                            <td th:text="${device.assetTag}"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Type</td>
                            <td th:text="${device.deviceType}"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Brand</td>
                            <td th:text="${device.brand}"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Model</td>
                            <td th:text="${device.model}"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Serial No.</td>
                            <td th:text="${device.serialNumber}"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Processor</td>
                            <td th:text="${device.processor}"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">RAM</td>
                            <td th:text="${device.ram}"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Storage</td>
                            <td th:text="${device.storage}"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">OS</td>
                            <td th:text="${device.operatingSystem}"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Status</td>
                            <td>
                                <span th:class="${'badge ' +
                                    (device.status != null && device.status.name() == 'AVAILABLE' ? 'bg-success' :
                                     device.status != null && device.status.name() == 'ASSIGNED' ? 'bg-warning text-dark' :
                                     device.status != null && device.status.name() == 'UNDER_REPAIR' ? 'bg-info' : 'bg-secondary')}"
                                      th:text="${device.status}">
                                </span>
                            </td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Condition</td>
                            <td th:text="${device.condition}"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Purchase Date</td>
                            <td th:text="${device.purchaseDate}"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Warranty Expiry</td>
                            <td th:text="${device.warrantyExpiry}"></td>
                        </tr>
                        <tr>
                            <td class="fw-bold text-muted">Notes</td>
                            <td th:text="${device.notes}"></td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>

        <!-- Update Condition Panel -->
        <div class="col-md-6">
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-header bg-danger text-white">
                    <i class="bi bi-tools"></i> Update Condition
                </div>
                <div class="card-body">
                    <form th:action="@{/devices/condition}" method="post"
                          class="d-flex gap-2">
                        <input type="hidden" name="deviceId" th:value="${device.id}">
                        <select class="form-select" name="condition">
                            <option th:each="c : ${T(com.airtel.inventory.model.Device.DeviceCondition).values()}"
                                    th:value="${c}" th:text="${c}"
                                    th:selected="${c == device.condition}">
                            </option>
                        </select>
                        <button type="submit" class="btn btn-danger">
                            Update
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
