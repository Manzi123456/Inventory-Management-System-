<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>

<!-- th:fragment="navbar" → defines this nav as a reusable fragment
     Every page calls th:replace="~{fragments/layout :: navbar}" to include it -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger"
     th:fragment="navbar">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-laptop"></i> Airtel Inventory
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/devices}">
                        <i class="bi bi-laptop"></i> Devices
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/employees}">
                        <i class="bi bi-people"></i> Employees
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/assignments}">
                        <i class="bi bi-arrow-left-right"></i> Assignments
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/departments}">
                        <i class="bi bi-building"></i> Departments
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-2">
                <span class="text-white-50 small" th:if="${session.username != null}">
                    <i class="bi bi-person-circle"></i>
                    <span th:text="${session.username}">user</span>
                </span>
                <a class="btn btn-sm btn-outline-light" th:href="@{/logout}">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap and Icons CSS included inside fragment so every page gets them -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</nav>

<!-- Bootstrap JS fragment — include at bottom of every page -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
    </script>
</th:block>

</body>
</html>
