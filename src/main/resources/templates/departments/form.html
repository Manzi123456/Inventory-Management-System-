<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Department Form | Airtel Inventory</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-4">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-danger text-white">
            <h5 th:text="${department.id != null ? 'Edit Department' : 'Add New Department'}"></h5>
        </div>
        <div class="card-body">
            <form th:action="@{/departments/save}" th:object="${department}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Department Name *</label>
                        <input type="text" class="form-control"
                               th:field="*{name}"
                               placeholder="e.g. IT, Finance, HR" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Description</label>
                        <input type="text" class="form-control"
                               th:field="*{description}"
                               placeholder="Brief description...">
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-save"></i> Save Department
                    </button>
                    <a th:href="@{/departments}" class="btn btn-outline-secondary">
                        <i class="bi bi-x"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
