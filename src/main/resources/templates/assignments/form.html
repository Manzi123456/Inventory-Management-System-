<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Issue Device | Airtel Inventory</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-4">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-danger text-white">
            <h5><i class="bi bi-arrow-right-circle"></i> Issue Device to Employee</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/assignments/issue}" method="post">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Select Device *</label>
                        <select class="form-select" name="deviceId" required>
                            <option value="">Choose available device...</option>
                            <option th:each="d : ${availableDevices}"
                                    th:value="${d.id}"
                                    th:text="${d.assetTag + ' — ' + d.brand + ' ' + (d.model ?: '') + ' (' + d.deviceType + ')'}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Select Employee *</label>
                        <select class="form-select" name="employeeId" required>
                            <option value="">Choose employee...</option>
                            <option th:each="e : ${activeEmployees}"
                                    th:value="${e.id}"
                                    th:text="${e.employeeId + ' — ' + e.firstName + ' ' + e.lastName}">
                            </option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Issued By *</label>
                        <input type="text" class="form-control"
                               name="issuedBy" placeholder="Admin name" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Purpose</label>
                        <input type="text" class="form-control"
                               name="purpose" placeholder="e.g. Field work">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Notes</label>
                        <input type="text" class="form-control" name="notes">
                    </div>
                </div>
                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-check-circle"></i> Issue Device
                    </button>
                    <a th:href="@{/assignments}" class="btn btn-outline-secondary">
                        <i class="bi bi-x"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
