<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assignment History | Airtel Inventory</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container-fluid mt-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-clock-history text-danger"></i> Assignment History</h2>
        <a th:href="@{/assignments}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back to Active
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-danger">
                    <tr>
                        <th>Asset Tag</th>
                        <th>Device</th>
                        <th>Employee</th>
                        <th>Issue Date</th>
                        <th>Return Date</th>
                        <th>Issued By</th>
                        <th>Returned To</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a : ${assignments}">
                        <td class="fw-bold" th:text="${a.device.assetTag}"></td>
                        <td th:text="${a.device.brand + ' ' + (a.device.model ?: '')}"></td>
                        <td th:text="${a.employee.firstName + ' ' + a.employee.lastName}"></td>
                        <td th:text="${a.issueDate}"></td>
                        <td th:text="${a.returnDate ?: 'Still Active'}"></td>
                        <td th:text="${a.issuedBy}"></td>
                        <td th:text="${a.returnedTo ?: '-'}"></td>
                        <td>
                            <span th:class="${a.status != null && a.status.name() == 'ACTIVE' ? 'badge bg-warning text-dark' : 'badge bg-success'}"
                                      th:text="${a.status}">
                                </span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(assignments)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            No assignment history yet
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
